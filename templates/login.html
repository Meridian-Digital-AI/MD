{% extends "base.html" %}
{% block title %}Sign In - Meridian Digital{% endblock %}

{% block content %}
<div class="card auth-card">
    <h1>Sign in</h1>
    <p class="muted">Enter your email to access your dashboard.</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login_submit') }}">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <p class="muted small auth-footer">
        Don't have an account? <a href="{{ url_for('onboarding') }}">Sign up</a>
    </p>
</div>
{% endblock %}
