{% extends "base.html" %}
{% block title %}Admin Login - Meridian Digital{% endblock %}

{% block content %}
<div class="card auth-card">
    <h1>Admin login</h1>
    <p class="muted">
        Sign in with your Meridian operator email.
    </p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login_submit') }}">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="wandj@meridian-digital-partners.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>
</div>
{% endblock %}
